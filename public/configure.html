<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Configure AnilistStream</title>

        <link rel="stylesheet" href="/styles.css" />
    </head>

    <body>
        <div class="container">
            <img src="/logo.png" class="logo" />

            <h1>AnilistStream</h1>

            <p class="description">
                Connect your AniList account to install the addon
            </p>

            <div id="login-state">
                <a
                    class="install-btn"
                    href="https://anilist.co/api/v2/oauth/authorize?client_id={{.ClientID}}&response_type=token"
                >
                    Login with AniList
                </a>
            </div>

            <div id="token-state" class="hidden">
                <div class="token-box">
                    <p class="description">Connected AniList token</p>
                    <code id="token-display"></code>
                </div>

                <button id="installBtn" class="install-btn">
                    Install in Stremio
                </button>
            </div>

            <a href="/" class="configure-btn"> ← Back to Home </a>
        </div>

        <script>
            const serverUrl = "{{.ServerURL}}";

            const loginState = document.getElementById("login-state");
            const tokenState = document.getElementById("token-state");
            const tokenDisplay = document.getElementById("token-display");
            const installBtn = document.getElementById("installBtn");

            let token = null;

            if (window.location.hash.includes("access_token=")) {
                const params = new URLSearchParams(
                    window.location.hash.substring(1),
                );
                token = params.get("access_token");

                if (token) {
                    sessionStorage.setItem("anilist_token", token);
                    history.replaceState(null, "", "/configure");
                }
            }

            if (!token) {
                token = sessionStorage.getItem("anilist_token");
            }

            function isLocal(url) {
                return (
                    url.includes("localhost") ||
                    url.includes("127.0.0.1") ||
                    /:\d+/.test(url) ||
                    url.startsWith("http://")
                );
            }

            if (token) {
                loginState.classList.add("hidden");
                tokenState.classList.remove("hidden");

                tokenDisplay.textContent =
                    token.slice(0, 6) + "••••••••••••" + token.slice(-4);

                installBtn.onclick = () => {
                    const manifest =
                        serverUrl +
                        "/" +
                        encodeURIComponent(token) +
                        "/manifest.json";

                    if (isLocal(serverUrl)) {
                        navigator.clipboard.writeText(manifest);

                        installBtn.innerText = "Copied!";

                        setTimeout(() => {
                            installBtn.innerText = "Install in Stremio";
                        }, 2000);
                    } else {
                        const clean = serverUrl.replace(/^https?:\/\//, "");

                        window.location.href = `stremio://${clean}/${encodeURIComponent(token)}/manifest.json`;
                    }
                };
            }
        </script>
    </body>
</html>
