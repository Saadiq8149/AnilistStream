<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Configure AnilistStream</title>
    </head>

    <style>
        :root {
            --bg: #000000;
            --primary: #0066cc;
            --primary-dark: #0052a3;
            --text-main: #eeeeee;
            --text-muted: #aaaaaa;
            --text-footer: #555555;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family:
                system-ui,
                -apple-system,
                sans-serif;
        }

        .container {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 18px;
            text-align: center;
        }

        .logo {
            width: 110px;
        }

        h1 {
            font-size: 42px;
            margin: 0;
        }

        .description {
            color: var(--text-muted);
            max-width: 420px;
            line-height: 1.5;
        }

        .install-btn {
            background: var(--primary);
            color: white;
            padding: 14px 28px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .install-btn:hover {
            background: var(--primary-dark);
        }

        footer {
            text-align: center;
            color: var(--text-footer);
            padding-bottom: 30px;
        }

        .configure-btn {
            margin-top: 10px;
            color: var(--text-muted);
            text-decoration: none;
        }

        .configure-btn:hover {
            color: var(--primary);
        }

        .token-box {
            border: 1px solid var(--border-primary);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .install-btn {
            text-decoration: none;
        }

        .hidden {
            display: none;
        }
    </style>
    <body>
        <div class="container">
            <img src="/logo.png" class="logo" />

            <h1>AnilistStream</h1>

            <p class="description">
                Connect your AniList account to install the addon
            </p>

            <div id="login-state">
                <a
                    class="install-btn"
                    href="https://anilist.co/api/v2/oauth/authorize?client_id={{.ClientID}}&response_type=token"
                >
                    Login with AniList
                </a>
            </div>

            <div id="token-state" class="hidden">
                <div class="token-box">
                    <p class="description">Connected AniList token</p>
                    <code id="token-display"></code>
                </div>

                <button id="installBtn" class="install-btn">
                    Install in Stremio
                </button>
            </div>

            <a href="/" class="configure-btn"> ← Back to Home </a>
        </div>

        <script>
            const serverUrl = "{{.ServerURL}}";

            const loginState = document.getElementById("login-state");
            const tokenState = document.getElementById("token-state");
            const tokenDisplay = document.getElementById("token-display");
            const installBtn = document.getElementById("installBtn");

            let token = null;

            if (window.location.hash.includes("access_token=")) {
                const params = new URLSearchParams(
                    window.location.hash.substring(1),
                );
                token = params.get("access_token");

                if (token) {
                    sessionStorage.setItem("anilist_token", token);
                    history.replaceState(null, "", "/configure");
                }
            }

            if (!token) {
                token = sessionStorage.getItem("anilist_token");
            }

            function isLocal(url) {
                return (
                    url.includes("localhost") ||
                    url.includes("127.0.0.1") ||
                    /:\d+/.test(url) ||
                    url.startsWith("http://")
                );
            }

            if (token) {
                loginState.classList.add("hidden");
                tokenState.classList.remove("hidden");

                tokenDisplay.textContent =
                    token.slice(0, 6) + "••••••••••••" + token.slice(-4);

                installBtn.onclick = () => {
                    const manifest =
                        serverUrl +
                        "/" +
                        encodeURIComponent(token) +
                        "/manifest.json";

                    if (isLocal(serverUrl)) {
                        navigator.clipboard.writeText(manifest);

                        installBtn.innerText = "Copied!";

                        setTimeout(() => {
                            installBtn.innerText = "Install in Stremio";
                        }, 2000);
                    } else {
                        const clean = serverUrl.replace(/^https?:\/\//, "");

                        window.location.href = `stremio://${clean}/${encodeURIComponent(token)}/manifest.json`;
                    }
                };
            }
        </script>
    </body>
</html>
