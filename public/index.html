<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>AnilistStream</title>
        <link rel="stylesheet" href="/styles.css" />
    </head>

    <body>
        <div class="container">
            <img src="/logo.png" class="logo" />

            <h1>AnilistStream</h1>

            <p class="description">
                Stream anime directly in Stremio with automatic AniList progress
                syncing.
            </p>

            <button id="installBtn" class="install-btn">Install Addon</button>

            <a href="/configure" class="configure-btn"> Configure Addon </a>
        </div>

        <footer>Powered by AniList</footer>

        <script>
            const serverUrl = "{{.ServerURL}}";
            const manifestUrl = serverUrl + "/manifest.json";
            const btn = document.getElementById("installBtn");

            function isLocal(url) {
                return (
                    url.includes("localhost") ||
                    url.includes("127.0.0.1") ||
                    /:\d+/.test(url) ||
                    url.startsWith("http://")
                );
            }

            if (isLocal(serverUrl)) {
                btn.innerText = "Copy Manifest URL";

                btn.onclick = async () => {
                    await navigator.clipboard.writeText(manifestUrl);
                    btn.innerText = "Copied!";

                    setTimeout(() => {
                        btn.innerText = "Copy Manifest URL";
                    }, 2000);
                };
            } else {
                const clean = serverUrl.replace(/^https?:\/\//, "");

                btn.onclick = () => {
                    window.location.href = `stremio://${clean}/manifest.json`;
                };
            }
        </script>
    </body>
</html>
