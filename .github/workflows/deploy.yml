name: Build, Push, Deploy

on:
    push:
        branches: [main]

jobs:
    docker:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and Push
              uses: docker/build-push-action@v5
              with:
                  push: true
                  tags: 12345saadiq/aniliststream:latest

            - name: Setup SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/oracle.key
                  chmod 600 ~/.ssh/oracle.key

                  cat <<EOF >> ~/.ssh/config
                  Host oracle
                    HostName 129.159.237.149
                    User opc
                    IdentityFile ~/.ssh/oracle.key
                    StrictHostKeyChecking no

                  Host home
                    HostName 100.91.154.11
                    User saadiq
                    ProxyJump oracle
                    StrictHostKeyChecking no
                  EOF

            - name: Deploy
              run: |
                  ssh home '
                  docker pull 12345saadiq/aniliststream:latest &&
                  docker rm -f aniliststream 2>/dev/null || true &&
                  docker run -d \
                    --restart unless-stopped \
                    --name aniliststream \
                    -p 7000:7000 \
                    --env-file /opt/aniliststream/.env \
                    12345saadiq/aniliststream:latest
                  '
